<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do Page</title>
</head>
<body>
    <h1>To-Do List</h1>
    <form action="/submittodoitem" method="POST" id="todoForm">
        <label>Item Name: <input type="text" name="itemName" required></label><br><br>
        <label>Item Description: <textarea name="itemDescription" required></textarea></label><br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
